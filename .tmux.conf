# rebind prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# undscore the current window (or pane?)
set -g window-status-current-style 'underscore'

# vim style pane nav
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key h
bind-key h select-pane -L
unbind-key l
bind-key l select-pane -R   

